
<div class="btn-group">
  <button type="button" class="btn"
    [ngClass]="currentComponent=='Roles'?'btn-success':'btn-primary'" (click)="componentToggler('Roles')">Roles</button>
  <button type="button" class="btn"
    [ngClass]="currentComponent=='Designation'?'btn-success':'btn-primary'" (click)="componentToggler('Designation')">Designations</button>
</div>
<div *ngIf="currentComponent=='Roles'">
    <app-roles></app-roles>

</div>
<div *ngIf="currentComponent=='Designation'">
    <app-designations></app-designations>
</div>
