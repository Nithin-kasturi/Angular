
<form class="form-horizontal" action="/action_page.php">
  <div class="form-group">
    <label class="control-label col-sm-2" for="userId">userId:</label>
    <div class="col-sm-10">
      <input type="number" class="form-control" [(ngModel)]="postObj.userId" id="userId" name='userId' placeholder="Enter userId">
    </div>
  </div>
  <div class="form-group">
    <label class="control-label col-sm-2" for="title">title:</label>
    <div class="col-sm-10">
      <input type="password" class="form-control"[(ngModel)]="postObj.title" id="title" name='title' placeholder="Enter Title">
    </div>
  </div>
  <div class="form-group">
    <label class="control-label col-sm-2" for="body">Body:</label>

    <div class="col-sm-10">
      <input type="text" class="form-control" id="body" [(ngModel)]="postObj.body" name='body' placeholder="Enter Body">
    </div>
  </div>
  <div class="form-group">
    <div class="col-sm-offset-2 col-sm-10">
      <button type="submit" class="btn btn-default" (click)="handleSubmit()">Submit</button>
    </div>
  </div>
</form>
